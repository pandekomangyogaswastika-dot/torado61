[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
markers =
    unit: Unit tests for service modules
    integration: Integration tests hitting API endpoints
    period: Period service tests
    ar: AR service tests
    reservation: Reservation service tests
    journal: Journal / GL tests
    procurement: Procurement (PR, PO, GR) tests
    approval: Approval workflow tests
    auth: Authentication / JWT tests
    anomaly: Anomaly detection tests
    bank_recon: Bank reconciliation tests
    structure: API structure / guardrail tests (trailing-slash, route conventions)
    finance: Finance module tests (payment runs, journals, GL)
    e2e: End-to-end business smoke pipeline (P2P PO->GR, inventory, payment run, journals) — deploy gate
